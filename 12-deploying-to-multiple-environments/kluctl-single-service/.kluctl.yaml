targets:
  - name: staging
    args:
      environment: staging
    # Adding a context to .kluctl.yaml helps prevent accidentally deploying to the wrong cluster!
    context: k3d-lab-cluster

  - name: production
    args:
      environment: production
    # Adding a context to .kluctl.yaml helps prevent accidentally deploying to the wrong cluster!
    context: do-sgp1-devops-kubernetes-course

args:
  - name: environment

discriminator: kluctl-{{ target.name }}
